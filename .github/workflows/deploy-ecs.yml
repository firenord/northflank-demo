name: Deploy to ECS

on:
  workflow_run:
    workflows: ["Build and Push Image (GHCR)"]
    types: [completed]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1
  ECS_CLUSTER: ecs-demo-cluster
  ECS_SERVICE: ecs-demo-app
  ECS_TASK_FAMILY: ecs-demo-app
  ECS_CONTAINER_NAME: ecs-demo-app

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch current task definition
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_TASK_FAMILY }}" \
            --query 'taskDefinition' \
            --output json > task-def.json

      - name: Sanitize task definition for registration
        run: |
          set -euo pipefail
          jq 'del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy,
                .containerDefinitions[].restartPolicy,
                .containerDefinitions[].versionConsistency
              )' task-def.json > task-def.sanitized.json
          mv task-def.sanitized.json task-def.json

      - name: Resolve container name
        id: container
        run: |
          set -euo pipefail
          desired="${{ env.ECS_CONTAINER_NAME }}"
          names="$(jq -r '.containerDefinitions[].name' task-def.json)"
          if [ -n "${desired}" ] && echo "${names}" | grep -Fxq "${desired}"; then
            echo "name=${desired}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          first="$(echo "${names}" | head -n1)"
          if [ -z "${first}" ]; then
            echo "No container definitions found in task definition." >&2
            exit 1
          fi
          echo "name=${first}" >> "${GITHUB_OUTPUT}"

      - name: Render task definition with new image
        id: render-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ steps.container.outputs.name }}
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.workflow_run.head_sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-td.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
