name: DOCR to ECR

on:
  workflow_dispatch:
    inputs:
      docr_image:
        description: "Full DOCR image URI (e.g. registry.digitalocean.com/brickeye/etl-mqtt-archiver:latest)"
        required: true
        type: string
      ecr_image:
        description: "Full ECR image URI (e.g. 123456789012.dkr.ecr.us-east-2.amazonaws.com/my-repo:latest)"
        required: true
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to DOCR
        run: |
          echo "${{ secrets.DOCR_TOKEN }}" | docker login registry.digitalocean.com -u "${{ secrets.DOCR_USERNAME }}" --password-stdin

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull, tag, and push
        run: |
          docker pull "${{ inputs.docr_image }}"
          docker tag "${{ inputs.docr_image }}" "${{ inputs.ecr_image }}"
          docker push "${{ inputs.ecr_image }}"
